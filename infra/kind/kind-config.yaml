# Local kind cluster config for SK Furniture
# Creates a 1 control-plane node cluster and maps host ports 80/443 into the
# node so the ingress-nginx controller (installed later) is reachable at
# http://localhost or http://skfurniture.local from the laptop's browser.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sk-furniture
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
