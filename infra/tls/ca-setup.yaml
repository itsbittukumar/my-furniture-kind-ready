# One-time setup: creates a local Certificate Authority (CA) inside the
# cluster, used to issue HTTPS certificates for *.local hostnames
# (skfurniture.local, grafana.local, prometheus.local).
#
# Real public CAs (like Let's Encrypt) can't issue certs for .local
# hostnames, so this creates our own local CA instead. Browsers will show
# a security warning unless this CA's root certificate is imported into
# Windows' trusted root store (see infra/tls/README.md).
#
# Requires cert-manager to be installed first:
#   helm repo add jetstack https://charts.jetstack.io
#   helm repo update
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace --set installCRDs=true

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sk-local-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: sk-furniture-local-ca
  secretName: sk-local-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: sk-local-ca-issuer
spec:
  ca:
    secretName: sk-local-ca-secret
