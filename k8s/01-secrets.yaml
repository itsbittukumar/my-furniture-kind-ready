# Replace these values before applying (or create with kubectl create secret instead
# of committing real secrets to source control - see README).
apiVersion: v1
kind: Secret
metadata:
  name: sk-backend-secret
  namespace: sk-furniture
type: Opaque
stringData:
  MONGO_URI: "mongodb://mongo:27017/skfurniture"
  JWT_SECRET: "change-this-to-a-long-random-secret"
  SEED_ADMIN_USERNAME: "admin"
  SEED_ADMIN_PASSWORD: "admin@123"
  SEED_ADMIN_EMAIL: "admin@skfurniture.com"
  # External MySQL on the laptop (host.docker.internal reaches the host
  # machine from inside the kind cluster). Update MYSQL_USER/PASSWORD to
  # match the MySQL user you create in the setup steps.
  MYSQL_HOST: "host.docker.internal"
  MYSQL_PORT: "3306"
  MYSQL_USER: "skfurniture"
  MYSQL_PASSWORD: "admin"
  MYSQL_DATABASE: "sk_furniture"
